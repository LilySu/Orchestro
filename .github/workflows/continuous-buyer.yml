name: Continuous Buyer

on:
  workflow_dispatch:
    inputs:
      max_rounds:
        description: "Rounds per agent job"
        required: false
        default: "500"
      loop_delay:
        description: "Seconds between rounds"
        required: false
        default: "3"

  schedule:
    - cron: "*/15 * * * *"

jobs:
  buy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      fail-fast: false
      matrix:
        agent:
          - "Celebrity Economy"
          - "Market Buyer"
          - "Nevermailed"
          - "AgentCard"
          - "BaseLayer Crypto Intel"
          - "BaseLayer Agent Eval"
          - "BaseLayer Web Scraper"
          - "PredictiveEdge"
          - "AiRI"
          - "CloudAGI Search"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet payments-py[fastapi] python-dotenv httpx

      - name: "Buy from: ${{ matrix.agent }}"
        env:
          NVM_API_KEY: ${{ secrets.NVM_API_KEY }}
          NVM_ENVIRONMENT: ${{ vars.NVM_ENVIRONMENT || 'sandbox' }}
          MAX_ROUNDS: ${{ github.event.inputs.max_rounds || '500' }}
          LOOP_DELAY: ${{ github.event.inputs.loop_delay || '3' }}
          CALL_DELAY: "0.3"
          AGENT_FILTER: ${{ matrix.agent }}
        working-directory: buyagent
        run: python continuous_buyer.py

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ matrix.agent }}
          path: buyagent/continuous_buyer_log-*.json
          retention-days: 30
